# p6spy 配置文件
# 依赖通过 Maven profile "p6spy" 引入：mvn ... -Pp6spy

# 使用 SLF4J 输出，日志交由 logback 统一管理
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 日志格式：单行输出，SQL 和参数已内联，可读性更好
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat

# 自定义输出格式：时间 | 执行耗时 | SQL（单行）
customLogMessageFormat=%(currentTime) | %(executionTime)ms | %(sqlSingleLine)

# 排除常见非业务 SQL，减少噪音
filter=false
excludecategories=info,debug,result,resultset,batch

# 超过指定毫秒的 SQL 才打印，0 表示全部打印
executionThreshold=0
