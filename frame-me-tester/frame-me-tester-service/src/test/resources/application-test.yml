spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    druid:
      register-mbeans: false
      validation-query: SELECT 1
      test-while-idle: true
    dynamic:
      enabled: false
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

me:
  mybatis:
    meta-object-handler:
      enabled: true
    snowflake:
      worker-id: 5
      datacenter-id: 1

jetcache:
  statIntervalMinutes: 0
  local:
    default:
      type: caffeine
      keyConvertor: fastjson2
      limit: 50
      expireAfterWriteInMillis: 300000
  remote:
    default:
      type: mock
      keyConvertor: fastjson2
      valueEncoder: java
      valueDecoder: java
