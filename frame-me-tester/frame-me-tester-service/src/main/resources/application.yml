server:
  port: 9090

management:
  server:
    port: 9091

spring:
  application:
    name: frame-me-tester
  datasource:
    url: jdbc:mysql://localhost:3306/frame_me_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
    dynamic:
      hikari:
        maximum-pool-size: 10
        minimum-idle: 10
      datasource:
        second:
          url: jdbc:mysql://localhost:3306/frame_me_test_2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
  #      username: xx
  #      password: xx
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

logging:
  file:
    path: ./logs
    name: ${spring.application.name}
  level:
    com.alicp.jetcache: INFO

springdoc:
  # /v3/api-docs
  api-docs:
    enabled: true
  # /swagger-ui.html
  swagger-ui:
    enabled: true

# 依赖通过 Maven profile "p6spy" 引入：mvn ... -Pp6spy
decorator:
  datasource:
    enabled: true
    p6spy:
      enable-logging: true

frame:
  me:
    # 依赖通过 Maven profile "swagger" 引入：mvn ... -Pswagger
    swagger:
      title: Frame Me Tester API
      description: Frame Me Tester 接口文档
      version: 1.0.0
      groups:
        - name: tester-api
          paths-to-match:
            - /api/**
    # mybatis:
    #   meta-object-handler:
    #     enabled: true
    #   snowflake:
    #     worker-id: 1
    #     datacenter-id: 0

jetcache:
  decodeFilterAllowPatterns:
    - com.frame.me.
  statIntervalMinutes: 15
  local:
    default:
      type: caffeine
      keyConvertor: fastjson2
      limit: 100
      expireAfterWriteInMillis: 600000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson2
      valueEncoder: kryo5
      valueDecoder: kryo5
      expireAfterWriteInMillis: 1800000
      broadcastChannel: ${spring.application.name}
      uri: redis://localhost:6379/0
#      uri: redis://u:p@host:port/db # @符号得替换成编码符

