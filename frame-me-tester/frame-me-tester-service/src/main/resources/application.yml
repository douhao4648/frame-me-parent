server:
  port: 8080

spring:
  application:
    name: frame-me-tester
  datasource:
    url: jdbc:mysql://localhost:3306/frame_me_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
    dynamic:
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
      datasource:
        second:
          url: jdbc:mysql://localhost:3306/frame_me_test_2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

logging:
  file:
    path: ./logs
    name: ${spring.application.name}

springdoc:
  # /v3/api-docs
  api-docs:
    enabled: true
  # /swagger-ui.html
  swagger-ui:
    enabled: true

# 依赖通过 Maven profile "p6spy" 引入：mvn ... -Pp6spy
decorator:
  datasource:
    enabled: true
    p6spy:
      enable-logging: true

frame:
  me:
    # 依赖通过 Maven profile "swagger" 引入：mvn ... -Pswagger
    swagger:
      enabled: true
      title: Frame Me Tester API
      description: Frame Me Tester 接口文档
      version: 1.0.0
      groups:
        - name: tester-api
          paths-to-match:
            - /api/**
