logging:
  file:
    path: ./logs
    name: ${spring.application.name}
  level:
    com.alicp.jetcache: INFO

springdoc:
  # /v3/api-docs
  api-docs:
    enabled: true
  # /swagger-ui.html
  swagger-ui:
    enabled: true

# 依赖通过 Maven profile "p6spy" 引入：mvn ... -Pp6spy
decorator:
  datasource:
    enabled: true
    p6spy:
      enable-logging: true

me:
  # 依赖通过 Maven profile "swagger" 引入：mvn ... -Pswagger
  swagger:
    title: Frame Me Tester API
    description: Frame Me Tester 接口文档
    version: 1.0.0
    groups:
      - name: tester-api
        paths-to-match:
          - /api/**
  redis:
    clients:
      second:
        host: localhost
        port: 6379
        database: 1
  # mybatis:
  #   meta-object-handler:
  #     enabled: true
  #   snowflake:
  #     worker-id: 1
  #     datacenter-id: 0

jetcache:
  decodeFilterAllowPatterns:
    - com.frame.me.
  statIntervalMinutes: 15
  local:
    default:
      type: caffeine
      keyConvertor: fastjson2
      limit: 100
      expireAfterWriteInMillis: 600000
  remote:
    default:
      type: redis.lettuce
      keyConvertor: fastjson2
      valueEncoder: kryo5
      valueDecoder: kryo5
      expireAfterWriteInMillis: 1800000
      broadcastChannel: ${spring.application.name}
      uri: redis://localhost:6379/0
#      uri: redis://u:p@host:port/db # @符号得替换成编码符

